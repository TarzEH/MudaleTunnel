<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="tunnelGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="12"/>

  <!-- Subtle border -->
  <rect width="900" height="220" fill="none" stroke="#2a1a1a" stroke-width="1" rx="12"/>

  <!-- Tunnel visualization (left side) -->
  <g opacity="0.12" stroke="#dc2626" fill="none">
    <!-- Concentric tunnel rings -->
    <ellipse cx="110" cy="110" rx="90" ry="90" stroke-width="0.6"/>
    <ellipse cx="110" cy="110" rx="70" ry="70" stroke-width="0.8"/>
    <ellipse cx="110" cy="110" rx="50" ry="50" stroke-width="1"/>
    <ellipse cx="110" cy="110" rx="30" ry="30" stroke-width="1.2"/>
    <!-- Radial lines -->
    <line x1="110" y1="20" x2="110" y2="200" stroke-width="0.5"/>
    <line x1="20" y1="110" x2="200" y2="110" stroke-width="0.5"/>
    <line x1="46" y1="46" x2="174" y2="174" stroke-width="0.5"/>
    <line x1="174" y1="46" x2="46" y2="174" stroke-width="0.5"/>
  </g>

  <!-- Tunnel flow arrows (right side) -->
  <g opacity="0.08" stroke="#ef4444" stroke-width="0.6" fill="none" transform="translate(720, 110)">
    <ellipse cx="0" cy="0" rx="80" ry="80"/>
    <ellipse cx="0" cy="0" rx="55" ry="55"/>
    <ellipse cx="0" cy="0" rx="30" ry="30"/>
    <line x1="0" y1="-80" x2="0" y2="80"/>
    <line x1="-80" y1="0" x2="80" y2="0"/>
  </g>

  <!-- Network nodes -->
  <g filter="url(#glow)">
    <!-- Center node (SSH server) -->
    <circle cx="110" cy="110" r="7" fill="#dc2626" opacity="0.9"/>
    <!-- Client nodes -->
    <circle cx="50" cy="50" r="3.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="170" cy="50" r="3.5" fill="#f97316" opacity="0.7"/>
    <circle cx="50" cy="170" r="3.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="170" cy="170" r="3.5" fill="#f97316" opacity="0.7"/>
    <circle cx="110" cy="35" r="3" fill="#fbbf24" opacity="0.6"/>
    <circle cx="110" cy="185" r="3" fill="#fbbf24" opacity="0.6"/>
    <circle cx="30" cy="110" r="3" fill="#ef4444" opacity="0.6"/>
    <circle cx="190" cy="110" r="3" fill="#f97316" opacity="0.6"/>
    <!-- Tunnel connections -->
    <g stroke="#dc2626" stroke-width="1.2" opacity="0.3">
      <line x1="110" y1="110" x2="50" y2="50"/>
      <line x1="110" y1="110" x2="170" y2="50"/>
      <line x1="110" y1="110" x2="50" y2="170"/>
      <line x1="110" y1="110" x2="170" y2="170"/>
      <line x1="110" y1="110" x2="110" y2="35"/>
      <line x1="110" y1="110" x2="110" y2="185"/>
      <line x1="110" y1="110" x2="30" y2="110"/>
      <line x1="110" y1="110" x2="190" y2="110"/>
    </g>
  </g>

  <!-- Lock/tunnel icon -->
  <g transform="translate(96, 93)" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.85">
    <!-- Padlock body -->
    <rect x="4" y="14" width="20" height="16" rx="3" fill="#dc2626" fill-opacity="0.15"/>
    <!-- Padlock shackle -->
    <path d="M 8,14 L 8,9 C 8,4 20,4 20,9 L 20,14" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="14" cy="22" r="2.5" fill="#dc2626" opacity="0.6"/>
    <line x1="14" y1="24" x2="14" y2="27" stroke-width="2" stroke-linecap="round" stroke="#dc2626" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="250" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="-1" filter="url(#textGlow)">
    <tspan fill="#e6edf3">Mudale</tspan><tspan fill="url(#accent)">Tunnel</tspan>
  </text>

  <!-- Tagline -->
  <text x="253" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#6b7280" font-weight="400" letter-spacing="2">
    RED TEAM SSH TUNNEL MANAGEMENT
  </text>

  <!-- Accent line -->
  <rect x="250" y="148" width="100" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>

  <!-- Version badge -->
  <g transform="translate(795, 20)">
    <rect width="75" height="24" rx="12" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-opacity="0.3" stroke-width="1"/>
    <text x="37" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#dc2626" text-anchor="middle" font-weight="600">v2.0.0</text>
  </g>
</svg>
